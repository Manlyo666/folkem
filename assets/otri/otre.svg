<svg viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8c0b0" stop-opacity=".28"/>
      <stop offset=".5" stop-color="#7a9a86" stop-opacity=".4"/>
      <stop offset="1" stop-color="#4a6a56" stop-opacity=".5"/>
    </linearGradient>
    <clipPath id="body">
      <path d="M60 20
               C57 20 55 22 55 26 L55 34
               C42 40 30 50 26 68
               C22 86 24 112 30 124
               C36 136 48 142 60 142
               C72 142 84 136 90 124
               C96 112 98 86 94 68
               C90 50 78 40 65 34 L65 26
               C65 22 63 20 60 20 Z"/>
    </clipPath>
  </defs>
  <!-- corpo damigiana: pancia molto larga, spalla arrotondata, collo corto -->
  <path d="M60 20
           C57 20 55 22 55 26 L55 34
           C42 40 30 50 26 68
           C22 86 24 112 30 124
           C36 136 48 142 60 142
           C72 142 84 136 90 124
           C96 112 98 86 94 68
           C90 50 78 40 65 34 L65 26
           C65 22 63 20 60 20 Z"
        fill="url(#glass)" stroke="#3f5f4b" stroke-width="2.5"/>
  <!-- vino (riempito via .fill dietro, ma qui aggiungo bordo base) -->
  <!-- manico piccolo sul collo -->
  <path d="M65 30 q14 2 12 16 q-1 6 -6 7" fill="none" stroke="#3f5f4b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- bocca/collo -->
  <rect x="53" y="12" width="14" height="10" rx="2" fill="url(#glass)" stroke="#3f5f4b" stroke-width="2.5"/>
  <ellipse cx="60" cy="12" rx="7" ry="2.4" fill="#c8d8cc" stroke="#3f5f4b" stroke-width="1.5"/>
  <!-- riflesso vetro -->
  <path d="M40 50 Q30 85 36 120" stroke="rgba(255,255,255,.35)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="46" cy="46" rx="4" ry="7" fill="rgba(255,255,255,.25)"/>
</svg>
