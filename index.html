<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e120c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>Folk 'Em</title>
<style>
:root{
  --wood-deep:#1e120c;--wood:#3a2419;--wood-lit:#4d3020;
  --brass:#c79a54;--brass-hi:#f0d089;--candle:#ffb648;
  --wine:#7a1220;--wine-hi:#b52236;--wine-glow:#e0424f;
  --parch:#e8d9b8;--parch-dim:#b8a684;--ink:#1a0f08;--ok:#6fae5a;
  /* font: Isenheim per testi/descrizioni, Victorian Decade per titoli e messaggi */
  --font-fairy:"Isenheim",Georgia,serif;
  --font-display:"VictorianDecade",Georgia,serif;
  --font-body:"Isenheim","Iowan Old Style",Palatino,Georgia,serif;
  --font-title:"VictorianDecade",Georgia,serif;
  --px:"Courier New",monospace;
}
@font-face{font-family:"Isenheim";src:url("assets/isenheim.woff2") format("woff2");font-display:swap}
@font-face{font-family:"VictorianDecade";src:url("assets/victorian.woff2") format("woff2");font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);color:var(--parch);
  background:#160d06 url("assets/bg.jpg") center/cover no-repeat fixed;
  -webkit-tap-highlight-color:transparent;image-rendering:pixelated;
  touch-action:manipulation;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(120% 90% at 50% 20%,rgba(0,0,0,.25),rgba(0,0,0,.72));}
.candle-glow{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(55% 40% at 50% 42%,rgba(255,182,72,.12),transparent 70%);animation:flicker 6s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:.85}45%{opacity:1}70%{opacity:.78}}

/* ===== SCALER: tutto sta in una schermata, si adatta ===== */
#stage{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center}
#scaler{width:820px;height:600px;position:relative;transform-origin:center center}

.fairy{font-family:var(--font-title)}
h1,h2,h3{font-family:var(--font-title);letter-spacing:.03em;font-weight:normal;
  text-shadow:0 2px 3px rgba(0,0,0,.85),0 0 18px rgba(255,180,60,.35)}
/* classe per il testo Victorian con ombra forte */
.vict{font-family:var(--font-title);text-shadow:0 2px 4px rgba(0,0,0,.9),0 0 20px rgba(255,180,60,.45),0 0 40px rgba(255,150,40,.25)}

/* ===== schermate ===== */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;padding:16px;overflow:hidden}
/* ============ PORTRAIT (mobile verticale): layout fluido a tutto schermo ============ */
body[data-portrait="1"] .screen{padding:0;justify-content:flex-start;width:100%;height:100%}
/* MENU */
body[data-portrait="1"] #screen-menu{justify-content:center;padding:4vh 5vw}
body[data-portrait="1"] .mode-list{gap:2.4vh;margin-top:3vh;width:100%}
body[data-portrait="1"] .mode-btn{width:100%;max-width:none;padding:2.6vh 5vw;gap:4vw}
body[data-portrait="1"] .mode-btn .mb-ico{font-size:8vw}
body[data-portrait="1"] .mode-btn .mb-txt b{font-size:6vw}
body[data-portrait="1"] .mode-btn .mb-txt span{font-size:3.4vw}
body[data-portrait="1"] .diff-btn{padding:1.8vh 5vw;font-size:4.6vw}
body[data-portrait="1"] .sign h1{font-size:12vw}
/* SETUP: header attaccato in alto, bottoni attaccati in basso, 9 maschere in mezzo SENZA scorrere */
body[data-portrait="1"] #screen-setup.active{justify-content:space-between;display:flex;flex-direction:column;height:100%;padding:1.5vh 2vw}
body[data-portrait="1"] #screen-setup .sign{flex-shrink:0;margin:0}
body[data-portrait="1"] #screen-setup .sign h1{font-size:11vw;margin:0;line-height:1}
body[data-portrait="1"] .setup-intro{font-size:1.9vw;margin:0.2vh 0;flex-shrink:0;line-height:1.15}
body[data-portrait="1"] .build-grid3{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:1.2vw;width:100%;flex:1 1 auto;min-height:0;max-width:100%}
body[data-portrait="1"] .build-card{flex-direction:column;padding:0.8vw;gap:0.4vh;text-align:center;
  justify-content:space-between;min-height:0;overflow:hidden}
body[data-portrait="1"] .bc-mask{width:auto;height:auto;flex:1 1 auto;min-height:0;aspect-ratio:3/4;max-width:100%;margin:0 auto}
body[data-portrait="1"] .bc-mask img{width:100%;height:100%;object-fit:contain}
body[data-portrait="1"] .bc-info{width:100%;flex-shrink:0}
body[data-portrait="1"] .bc-info .rank-label{font-size:2.0vw;line-height:1.1}
body[data-portrait="1"] .bc-info .bc-name{font-size:3.2vw;line-height:1.1}
body[data-portrait="1"] .bc-stats{gap:2vw;flex-shrink:0}
body[data-portrait="1"] .bc-stats .st b{font-size:3.2vw}
body[data-portrait="1"] .bc-stats .st span{font-size:2.2vw}
body[data-portrait="1"] .bc-swap{font-size:2.6vw;padding:0.5vh 1vw;flex-shrink:0;margin-top:0.4vh}
body[data-portrait="1"] #screen-setup > div:last-child{flex-shrink:0;padding-top:1vh;gap:2vw}
body[data-portrait="1"] #screen-setup > div:last-child .btn{padding:1.6vh 6vw;font-size:4.4vw}
/* TAVOLO: 3 zone verticali che riempiono lo schermo, carte grandi in vw/vh */
body[data-portrait="1"] #screen-table.active{padding:1vh 1.5vw;display:flex;flex-direction:column;height:100%}
body[data-portrait="1"] .table-top,body[data-portrait="1"] .table-bottom{gap:0.6vh;flex-shrink:0}
body[data-portrait="1"] .table-mid{gap:0.6vh;flex:1 1 auto;min-height:0}
body[data-portrait="1"] .player-strip{gap:2vw;padding:0 3vw}
/* carte dimensionate sulla larghezza: 5 a terra devono stare in fila */
body[data-portrait="1"] .card.big,body[data-portrait="1"] .card.mid{width:17vw;height:24.6vw;max-height:15vh}
body[data-portrait="1"] .community-row{gap:1.2vw}
body[data-portrait="1"] .hand-cards{gap:1.6vw}
body[data-portrait="1"] .otre{width:15vw;height:19vw;max-height:12vh}
body[data-portrait="1"] .hp-num{font-size:4.6vw}
body[data-portrait="1"] .otre-wrap{width:16vw}
body[data-portrait="1"] .otre-wrap .who{font-size:3vw}
body[data-portrait="1"] .action-bar{gap:1.5vw;min-height:7vh}
body[data-portrait="1"] .action-bar .btn{font-size:3.6vw;padding:1.3vh 2vw}
body[data-portrait="1"] .log-box{height:13vh;font-size:3vw;flex-shrink:0}
.screen.active{display:flex;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

.sign{text-align:center;margin:6px 0 4px}
.sign h1{font-family:var(--font-title);font-size:60px;color:var(--brass-hi);
  text-shadow:0 3px 4px rgba(0,0,0,.9),0 2px 0 #000,0 0 28px rgba(255,150,60,.6),0 0 55px rgba(255,120,40,.35);line-height:1;letter-spacing:.02em}
.sign .sub{color:var(--parch);font-size:16px;letter-spacing:.1em;margin-top:2px;font-family:var(--font-title);text-shadow:0 1px 3px rgba(0,0,0,.8)}
.hr-brass{height:2px;border:0;margin:8px auto;max-width:340px;background:linear-gradient(90deg,transparent,var(--brass),transparent)}

.panel{background:linear-gradient(180deg,rgba(40,24,16,.94),rgba(24,14,9,.96));
  border:2px solid var(--brass);border-radius:14px;
  box-shadow:0 10px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);padding:16px}

/* bottoni */
.btn{font-family:var(--font-body);font-weight:700;letter-spacing:.01em;cursor:pointer;padding:11px 18px;
  border-radius:9px;border:2px solid var(--brass);font-size:16px;text-shadow:0 1px 2px rgba(0,0,0,.5);
  background:linear-gradient(180deg,var(--wood-lit),var(--wood));color:var(--parch);
  transition:.15s;box-shadow:0 3px 0 rgba(0,0,0,.4)}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 10px rgba(0,0,0,.5)}
.btn:active:not(:disabled){transform:translateY(1px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.primary{background:linear-gradient(180deg,var(--brass),#9a7636);color:var(--ink);border-color:var(--brass-hi);text-shadow:none}
.btn.atk{background:linear-gradient(180deg,var(--wine-hi),var(--wine));color:#fff;border-color:var(--wine-glow)}
.btn.def{background:linear-gradient(180deg,#4f7a3e,#2f5024);color:#fff;border-color:var(--ok)}
.btn.ghost{background:rgba(20,12,7,.6)}
.btn.big{font-size:19px;padding:14px 24px;min-width:260px}

/* ===== MENU MODALITÀ ===== */
.mode-list{display:flex;flex-direction:column;gap:12px;margin-top:14px;align-items:center}
.mode-btn{width:320px;text-align:left;display:flex;align-items:center;gap:12px;padding:12px 16px}
.mode-btn .mb-ico{font-size:26px}
.mode-btn .mb-txt{flex:1}
.mode-btn .mb-txt b{font-family:var(--font-title);font-size:21px;color:var(--brass-hi);display:block;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.mode-btn .mb-txt span{font-size:12px;color:var(--parch-dim)}
.mode-btn.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.6)}
.diff-row{display:flex;gap:10px;justify-content:center;margin-top:6px}
.diff-btn{padding:10px 18px}
.diff-btn.on{background:linear-gradient(180deg,var(--brass),#9a7636);color:var(--ink);border-color:var(--brass-hi)}
.menu-tools{position:absolute;top:12px;right:12px;display:flex;gap:8px;z-index:15}
.menu-tools.tools-left{left:12px;right:auto}
body[data-portrait="1"] .menu-tools.tools-left{left:2.5vw;right:auto}
.icon-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--brass);cursor:pointer;
  background:radial-gradient(circle at 40% 35%,#5a3a20,#2a1810);display:flex;align-items:center;justify-content:center;
  font-size:24px;color:var(--brass-hi);transition:.2s;-webkit-tap-highlight-color:rgba(255,180,60,.4);
  user-select:none;touch-action:manipulation}
body[data-portrait="1"] .menu-tools{top:1.5vh;right:2.5vw}
body[data-portrait="1"] .icon-btn{width:11vw;height:11vw;font-size:5.5vw}
.icon-btn:active{transform:scale(.92)}
.icon-btn.off{opacity:.5;border-color:#6b5535}
/* righe delle opzioni: etichetta a sinistra, interruttore a destra */
.opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;margin:2px 0}
.opt-row .opt-lbl{font-family:var(--font-body);font-size:15px;color:var(--parch)}
.opt-row .lang-switch{margin:0}
.icon-btn:hover{box-shadow:0 0 14px rgba(255,180,60,.5)}
/* pulsante lingua: mostra la bandiera dell'ALTRA lingua (quella a cui si passa) */
.lang-btn{overflow:hidden;padding:0;position:relative}
.lang-btn .ujack{position:absolute;inset:0;background:center/cover no-repeat}
.lang-btn[data-shows="en"] .ujack{background-image:url("assets/ujack.svg")}
.lang-btn[data-shows="it"] .ujack{background-image:url("assets/itflag.svg")}
.cartwheel{animation:none}

/* ===== SETUP 3x3 ===== */
.setup-intro{color:var(--parch-dim);font-size:11px;line-height:1.4;margin:5px 0 8px;text-align:center;max-width:640px;font-family:var(--font-body)}
.build-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:660px}
.build-card{background:rgba(20,12,7,.72);border:1px solid var(--wood-lit);border-radius:10px;
  padding:7px;display:flex;align-items:center;gap:8px}
.build-card.fixed{opacity:.8;border-style:dashed}
.bc-mask{width:52px;height:66px;border-radius:5px;overflow:hidden;flex-shrink:0;
  background:#160d07;border:1px solid var(--wood-lit)}
.bc-mask img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
.bc-info{flex:1;min-width:0}
.bc-info .rank-label{font-size:9px;color:var(--brass);letter-spacing:.08em;text-transform:uppercase}
.bc-info .bc-name{font-family:var(--font-title);font-size:19px;color:var(--parch-hi,#f0e2c4);line-height:1.05;
  text-shadow:0 1px 3px rgba(0,0,0,.85)}
.bc-stats{display:flex;gap:5px;margin-top:3px}
.bc-stats .st{flex:1;text-align:center;font-size:10px;border-radius:4px;padding:2px;background:rgba(0,0,0,.35)}
.bc-stats .st b{display:block;font-family:var(--px);font-size:13px}
.st.atk b{color:var(--wine-glow)}.st.def b{color:var(--ok)}
.bc-swap{margin-top:4px;width:100%;padding:4px;border-radius:5px;cursor:pointer;font-family:var(--font-fairy);
  font-size:11px;background:linear-gradient(180deg,var(--wood-lit),var(--wood));color:var(--parch);border:1px solid var(--brass)}
.bc-swap.on{background:linear-gradient(180deg,var(--wine-hi),var(--wine));color:#fff;border-color:var(--wine-glow)}
.bc-lock{margin-top:4px;font-size:10px;color:var(--brass);text-align:center}

/* ===== TAVOLO ===== */
#screen-table{padding:6px 10px;
  background:#160d06 url("assets/table.jpg") center/cover no-repeat;
  box-shadow:inset 0 0 160px rgba(0,0,0,.55)}
.table-top,.table-bottom{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%}
.table-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:100%;position:relative;min-height:0}

/* fila giocatore: otre a SX, carte a DX (avversario: otre a DX) */
.player-strip{display:flex;align-items:center;gap:12px;justify-content:flex-start;width:100%;padding:0 6%}
.player-strip.foe{flex-direction:row-reverse}   /* avversario: damigiana a destra */
.otre-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;width:78px}
.otre-wrap .who{font-family:var(--font-fairy);font-size:13px;color:var(--brass);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.otre{position:relative;width:72px;height:92px;display:flex;align-items:flex-end;justify-content:center}
.otre img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;z-index:2;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))}
/* il vino sta in un contenitore sagomato come il corpo della damigiana (non fuoriesce) */
.otre .fill-clip{position:absolute;left:21%;right:21%;top:22%;bottom:5%;z-index:1;overflow:hidden;
  border-radius:44% 44% 46% 46%/22% 22% 40% 40%}
.otre .fill{position:absolute;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,#c8283c,#7a0e18);
  transition:height .6s ease;opacity:.9}
/* TRABOCCAMENTO: oltre ~150 PV il vino esce dal collo e cola sui fianchi */
.otre .spill{position:absolute;left:0;right:0;top:0;bottom:0;z-index:3;pointer-events:none;opacity:0;
  transition:opacity .5s ease}
.otre.overflowing .spill{opacity:1}
.otre .spill .drip{position:absolute;top:16%;width:5px;border-radius:0 0 3px 3px;
  background:linear-gradient(180deg,#e0424f,#7a0e18);opacity:.95;
  transform-origin:top center;animation:dripDown 2.4s ease-in-out infinite}
.otre .spill .drip.d1{left:30%;height:34%;animation-delay:0s}
.otre .spill .drip.d2{left:50%;height:46%;animation-delay:.5s;width:6px}
.otre .spill .drip.d3{left:66%;height:30%;animation-delay:1.1s}
@keyframes dripDown{
  0%{transform:scaleY(.15);opacity:0}
  25%{transform:scaleY(1);opacity:.95}
  75%{transform:scaleY(1);opacity:.9}
  100%{transform:scaleY(1.25);opacity:0}}
/* pozza che si forma alla base quando trabocca */
.otre .spill .puddle{position:absolute;left:14%;right:14%;bottom:-6%;height:10%;
  background:radial-gradient(ellipse at center,#a3121f 0%,rgba(122,14,24,.75) 55%,transparent 75%);
  border-radius:50%;animation:puddleGrow 2.4s ease-in-out infinite}
@keyframes puddleGrow{0%,100%{transform:scaleX(.75);opacity:.55}50%{transform:scaleX(1.1);opacity:.9}}
/* bagliore del vino quasi colmo */
.otre.overflowing img{filter:drop-shadow(0 0 10px rgba(224,66,79,.7))}
.otre.hit{animation:otreHit .5s ease}
@keyframes otreHit{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-3deg)}40%{transform:translateX(5px) rotate(2deg)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
.otre.heal{animation:otreHeal .7s ease}
@keyframes otreHeal{0%,100%{transform:scale(1);filter:none}45%{transform:scale(1.08);filter:drop-shadow(0 0 14px rgba(120,220,120,.8))}}
.hp-num{font-family:var(--px);font-weight:bold;font-size:17px;color:var(--parch);text-shadow:0 1px 2px #000}
.hp-num.over{color:var(--brass-hi);text-shadow:0 0 8px rgba(240,208,137,.8)}
.hp-unit{font-size:.62em;margin-left:2px;opacity:.8;font-weight:normal;letter-spacing:.03em}

/* carte */
.hand-cards{display:flex;gap:8px}
.card{border-radius:7px;overflow:hidden;position:relative;line-height:0;user-select:none;
  box-shadow:0 3px 6px rgba(0,0,0,.55);transition:transform .2s ease,box-shadow .2s ease;flex-shrink:0}
.card svg,.card img{display:block;width:100%;height:100%}
.card.big{width:66px;height:96px}
.card.mid{width:58px;height:84px}
.card.mine{outline:2px solid var(--brass-hi);box-shadow:0 0 12px rgba(240,208,137,.55),0 3px 6px rgba(0,0,0,.55)}
.card.selectable{cursor:pointer}
.card.selectable:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 14px 20px rgba(0,0,0,.6)}  /* ombra cresce al movimento */
.card.mine.selectable:hover{box-shadow:0 0 14px rgba(240,208,137,.7),0 14px 20px rgba(0,0,0,.6)}
.card.flip{animation:flipIn .5s ease}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
.card.deal{animation:dealIn .55s cubic-bezier(.2,1,.4,1)}   /* ombra marcata appena calata */
@keyframes dealIn{0%{transform:translateY(-40px) scale(.8);opacity:0;box-shadow:0 24px 30px rgba(0,0,0,.7)}
  60%{box-shadow:0 18px 26px rgba(0,0,0,.6)}100%{transform:translateY(0) scale(1);opacity:1;box-shadow:0 3px 6px rgba(0,0,0,.55)}}
.foe-inverted{transform:rotate(180deg)}   /* pvp locale: carte avversario ruotate */
/* in PvP capovolgo anche la damigiana e il nome dell'avversario (siede di fronte) */
body[data-pvp="1"] .player-strip.foe .otre{transform:rotate(180deg)}
body[data-pvp="1"] .player-strip.foe .who{transform:rotate(180deg)}
body[data-pvp="1"] .player-strip.foe .hp-num{transform:rotate(180deg)}

/* 5a carta che scivola LENTAMENTE al centro sovrapponendosi alle altre */
.card.deal-center{animation:dealCenter 1.3s cubic-bezier(.25,1,.4,1);z-index:5;
  box-shadow:0 18px 30px rgba(0,0,0,.65)}
@keyframes dealCenter{
  0%{transform:scale(.7) translateY(-60px) rotate(-8deg);opacity:0;box-shadow:0 30px 40px rgba(0,0,0,.8)}
  40%{opacity:1}
  100%{transform:translateY(0) scale(1.12) rotate(0);opacity:1;box-shadow:0 10px 20px rgba(0,0,0,.6)}}

/* carta appena cambiata dall'avversario: lampeggio dorato + capovolgimento */
.card.card-swapped{animation:cardSwapped 1s ease}
@keyframes cardSwapped{
  0%{transform:rotateY(0);box-shadow:0 3px 6px rgba(0,0,0,.55)}
  30%{transform:rotateY(90deg) scale(1.05);box-shadow:0 0 24px 6px rgba(255,200,80,.9)}
  60%{transform:rotateY(0) scale(1.05);box-shadow:0 0 24px 6px rgba(255,200,80,.9)}
  100%{transform:rotateY(0) scale(1);box-shadow:0 3px 6px rgba(0,0,0,.55)}}

/* pulsazione del bottone Giocatore vs IA per invitare a confermare la difficoltà */
.confirm-pulse{animation:confirmPulse 1s ease-in-out infinite}
/* ANIMAZIONE FIABESCA a tutto schermo all'evocazione */
.summon-flash{position:absolute;inset:0;z-index:35;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 50%,rgba(255,190,90,.35),rgba(20,10,6,.9));
  animation:summonBg .5s ease;overflow:hidden}
.summon-flash.fade{animation:summonFade .4s ease forwards}
@keyframes summonBg{0%{opacity:0}100%{opacity:1}}
@keyframes summonFade{to{opacity:0}}
.summon-ring{position:absolute;width:80px;height:80px;border:4px solid var(--brass-hi);border-radius:50%;
  box-shadow:0 0 40px rgba(255,190,90,.8),inset 0 0 30px rgba(255,190,90,.5);
  animation:summonRing 1.2s cubic-bezier(.2,.8,.3,1) forwards}
.summon-ring.r2{border-color:var(--wine-glow);animation-delay:.15s;
  box-shadow:0 0 40px rgba(224,66,79,.7),inset 0 0 30px rgba(224,66,79,.4)}
@keyframes summonRing{0%{width:40px;height:40px;opacity:1}100%{width:700px;height:700px;opacity:0}}
.summon-text{font-family:var(--font-title);font-size:42px;color:var(--brass-hi);text-align:center;
  -webkit-text-stroke:3px #000;paint-order:stroke fill;   /* contorno nero: si legge su qualsiasi sfondo */
  text-shadow:0 3px 5px rgba(0,0,0,.95),0 0 34px rgba(255,190,90,.95),0 0 60px rgba(255,150,40,.4);z-index:2;
  animation:summonTextIn 1.2s ease forwards;padding:0 20px}
@keyframes summonTextIn{0%{transform:scale(.5);opacity:0}30%{transform:scale(1.1);opacity:1}70%{transform:scale(1);opacity:1}100%{opacity:.9}}
@keyframes confirmPulse{0%,100%{box-shadow:0 3px 0 rgba(0,0,0,.4)}50%{box-shadow:0 0 18px 3px rgba(255,180,60,.7)}}

/* ANNUNCIO ARMA a centro schermo (stile anime: la maschera dichiara il colpo) */
.weapon-announce{position:absolute;left:0;right:0;top:38%;z-index:36;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  animation:waIn .35s cubic-bezier(.2,1.4,.4,1) forwards}
.weapon-announce.out{animation:waOut .4s ease forwards}
.weapon-announce .wa-mask{font-family:var(--font-title);font-size:30px;color:var(--brass-hi);
  text-shadow:0 3px 5px rgba(0,0,0,.95),0 0 24px rgba(255,190,90,.85)}
.weapon-announce .wa-weapon{font-family:var(--font-display),Georgia,serif;font-weight:900;
  font-size:clamp(18px,7vw,38px);white-space:nowrap;text-align:center;
  color:#fff;-webkit-text-stroke:2.5px #7a0e18;paint-order:stroke fill;letter-spacing:-.5px;
  text-shadow:0 3px 10px rgba(0,0,0,.8),0 0 24px rgba(224,66,79,.7);
  padding:6px 20px;background:linear-gradient(90deg,transparent,rgba(122,14,24,.35),transparent);
  max-width:96vw;overflow:hidden}
/* annuncio della CURA: il NOME resta dorato come nell attacco, solo "Cura" e verde */
.weapon-announce.heal-announce .wa-weapon{color:#eaffea;-webkit-text-stroke:2.5px #0d3d18;
  text-shadow:0 3px 10px rgba(0,0,0,.8),0 0 24px rgba(70,210,100,.75);
  background:linear-gradient(90deg,transparent,rgba(20,90,40,.38),transparent)}
@keyframes waIn{0%{transform:translateY(30px) scale(.6);opacity:0}60%{transform:translateY(0) scale(1.12);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes waOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.25) translateY(-20px)}}

/* SCUDO di parata: appare sull'otre difesa e riduce il danno */
.shield-fx{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:30;
  font-size:40px;pointer-events:none;animation:shieldBlock 1.1s ease-out forwards;
  filter:drop-shadow(0 0 8px rgba(120,180,255,.9))}
@keyframes shieldBlock{
  0%{transform:translate(-50%,-50%) scale(.3) rotate(-20deg);opacity:0}
  30%{transform:translate(-50%,-50%) scale(1.25) rotate(0);opacity:1}
  55%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}
  100%{transform:translate(-50%,-90%) scale(.9);opacity:0}}
.shield-fx .blocked-n{position:absolute;left:50%;top:52%;transform:translateX(-50%);
  font-size:13px;font-family:var(--px);font-weight:bold;color:#dceaff;text-shadow:0 1px 2px #000}

.board-label{font-family:var(--font-fairy);font-size:12px;color:var(--brass);letter-spacing:.06em;text-align:center;min-height:16px}
/* ULTIMO GIRO al posto della scritta "Carte a terra": inciso nel legno */
.board-label.lastcall-inline{font-family:var(--font-title);letter-spacing:.12em;
  color:rgba(38,20,10,.82);
  text-shadow:0 -1px 0 rgba(0,0,0,.55),0 1px 0 rgba(214,170,110,.32),0 2px 1px rgba(255,215,160,.15)}
.board-label.lastcall-inline .lcb-t{font-size:15px}
.board-label.lastcall-inline .lcb-n{font-size:19px;font-weight:bold}
.board-label.lastcall-inline.urgent{color:rgba(102,12,18,.9);
  text-shadow:0 -1px 0 rgba(0,0,0,.6),0 1px 0 rgba(226,150,120,.34),0 0 10px rgba(200,40,50,.32);
  animation:lcCarve 1.4s ease-in-out infinite}
body[data-portrait="1"] .board-label.lastcall-inline .lcb-t{font-size:3.4vw}
body[data-portrait="1"] .board-label.lastcall-inline .lcb-n{font-size:4.4vw}
.community-row{display:flex;gap:7px;justify-content:center}

/* pulsanti azione (bottom + top per pvp) */
.action-bar{display:flex;gap:8px;justify-content:center;flex-wrap:nowrap;margin-top:4px;width:100%;
  min-height:52px;align-items:center}
.btn.compact{padding:9px 12px;font-size:14px;white-space:nowrap}
.action-bar.top{transform:rotate(180deg)}   /* per il player 2 in pvp locale */
.action-bar .btn{font-size:14px;padding:8px 14px}

/* ===== OVERLAY MASCHERE AL CENTRO (copre le carte) ===== */
.mask-overlay{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;gap:20px;
  background:radial-gradient(circle at 50% 50%,rgba(20,10,6,.82),rgba(10,6,3,.94))}
.mask-overlay.show{display:flex;animation:fadeIn .3s}
/* le maschere lasciano il centro prima che il vino venga versato */
.mask-overlay.closing{animation:maskDuelOut .42s ease forwards}
@keyframes maskDuelOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.92)}}
.mask-slot{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.mask-slot .rank-tag{font-family:var(--font-title);font-size:16px;color:var(--brass-hi);min-height:18px;text-shadow:0 1px 3px rgba(0,0,0,.85)}
.mask-slot .weapon-tag{font-size:11px;color:var(--parch-dim);font-style:italic;min-height:14px}
.mask-card{width:150px;height:210px;border-radius:12px;overflow:hidden;position:relative;
  border:3px solid var(--brass);background:#160d07;box-shadow:0 8px 30px rgba(0,0,0,.7)}
.mask-card img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
.mask-card .mc-stats{position:absolute;left:0;right:0;bottom:0;display:flex;
  background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);padding:14px 6px 5px}
.mask-card .mc-s{flex:1;text-align:center;font-size:11px}
.mask-card .mc-s b{display:block;font-family:var(--px);font-size:14px}
.mc-s.atk b{color:var(--wine-glow)}.mc-s.def b{color:var(--ok)}
.mask-card.foe{border-color:var(--wine-glow)}
.mask-card.hidden-mask{display:flex;align-items:center;justify-content:center;background:#3a1015}
.mask-card.hidden-mask::after{content:"?";font-family:var(--px);font-size:64px;color:var(--brass);opacity:.6}
.mask-card.win{border-color:var(--brass-hi);box-shadow:0 0 40px rgba(255,200,90,.7)}
.mask-card.lose{filter:grayscale(.7) brightness(.55)}
/* la maschera perdente viene STRAPPATA in due metà lungo una linea frastagliata */
.mask-card.destroyed{animation:maskShake .18s ease 2}
@keyframes maskShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px) rotate(-2deg)}75%{transform:translateX(5px) rotate(2deg)}}
.tear-wrap{position:absolute;inset:0;pointer-events:none;z-index:8}
.tear-half{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.8))}
/* metà sinistra: taglio frastagliato verticale */
.tear-half.left{clip-path:polygon(0 0, 52% 0, 46% 12%, 54% 26%, 44% 40%, 53% 55%, 45% 70%, 52% 85%, 47% 100%, 0 100%);
  animation:tearLeft .9s cubic-bezier(.3,.7,.4,1) forwards}
.tear-half.right{clip-path:polygon(52% 0, 100% 0, 100% 100%, 47% 100%, 52% 85%, 45% 70%, 53% 55%, 44% 40%, 54% 26%, 46% 12%);
  animation:tearRight .9s cubic-bezier(.3,.7,.4,1) forwards}
@keyframes tearLeft{
  0%{transform:translate(0,0) rotate(0);opacity:1}
  18%{transform:translate(-6px,0) rotate(-2deg);opacity:1}
  100%{transform:translate(-90px,60px) rotate(-32deg);opacity:0}}
@keyframes tearRight{
  0%{transform:translate(0,0) rotate(0);opacity:1}
  18%{transform:translate(6px,0) rotate(2deg);opacity:1}
  100%{transform:translate(90px,66px) rotate(30deg);opacity:0}}
/* lampo sulla linea di strappo */
.tear-flash{position:absolute;left:50%;top:0;bottom:0;width:6px;transform:translateX(-50%);
  background:linear-gradient(180deg,transparent,#fff,rgba(255,200,90,.9),#fff,transparent);
  filter:blur(1px);animation:tearFlash .45s ease forwards;z-index:9}
@keyframes tearFlash{0%{opacity:0;transform:translateX(-50%) scaleY(.2)}
  30%{opacity:1;transform:translateX(-50%) scaleY(1)}
  100%{opacity:0;transform:translateX(-50%) scaleY(1) scaleX(3)}}
.mask-vs{font-family:var(--font-title);font-size:24px;color:var(--brass);align-self:center;text-shadow:0 2px 4px rgba(0,0,0,.85)}

/* animazioni maschera (attacco/parata) */
.mask-card.lunge-up{animation:lungeUp .5s ease}
@keyframes lungeUp{0%,100%{transform:translateY(0)}40%{transform:translateY(-24px) scale(1.06)}}
.mask-card.lunge-down{animation:lungeDown .5s ease}
@keyframes lungeDown{0%,100%{transform:translateY(0)}40%{transform:translateY(24px) scale(1.06)}}
.mask-card.glow-heal{animation:glowHeal .9s ease}
@keyframes glowHeal{0%,100%{filter:none}50%{filter:drop-shadow(0 0 22px rgba(120,220,120,.9)) brightness(1.2)}}

/* arma lanciata */
.thrown{position:absolute;width:52px;height:52px;z-index:30;pointer-events:none;left:50%;top:50%;
  filter:drop-shadow(0 0 6px rgba(255,220,120,.9)) drop-shadow(0 2px 3px rgba(0,0,0,.6))}
.thrown svg{width:100%;height:100%}
.thrown.volley{z-index:31}
/* esplosione all'impatto */
.impact{position:absolute;width:36px;height:36px;transform:translate(-50%,-50%);z-index:32;pointer-events:none;
  background:radial-gradient(circle,rgba(255,230,150,.95),rgba(255,140,50,.6) 40%,transparent 70%);
  border-radius:50%;animation:impactPop .4s ease-out forwards}
@keyframes impactPop{0%{transform:translate(-50%,-50%) scale(.2);opacity:1}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}

/* NUMERI danni/cure stile Balatro: grandi, con bordo bianco */
/* numeri di danno/cura: font a cifre NETTE (il Victorian confondeva 3 e 8),
   bordo nero spesso fuori e alone chiaro dentro: leggibili su qualsiasi sfondo */
.float{position:absolute;left:50%;top:0%;transform:translateX(-50%);
  font-family:"Arial Black","Helvetica Neue",Arial,sans-serif;
  font-weight:900;font-size:46px;pointer-events:none;animation:floatUp 2.4s cubic-bezier(.15,.9,.3,1) forwards;z-index:33;
  -webkit-text-stroke:5px #12060a;paint-order:stroke fill;letter-spacing:0;
  font-variant-numeric:tabular-nums}
.float.dmg{color:#ff5a63;
  text-shadow:0 0 3px #12060a,0 0 6px #12060a,0 0 16px rgba(255,60,70,.9),0 3px 0 rgba(90,0,8,.9)}
.float.heal{color:#6ef07f;
  text-shadow:0 0 3px #06200c,0 0 6px #06200c,0 0 16px rgba(80,240,110,.9),0 3px 0 rgba(0,60,15,.9)}
.float.block{color:var(--brass-hi);font-size:30px;-webkit-text-stroke:2px #fff}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,20px) scale(.4) rotate(-8deg)}
  15%{opacity:1;transform:translate(-50%,-6px) scale(1.4) rotate(3deg)}
  28%{transform:translate(-50%,-10px) scale(1.1) rotate(-2deg)}
  75%{opacity:1;transform:translate(-50%,-24px) scale(1.05)}
  100%{opacity:0;transform:translate(-50%,-70px) scale(1)}}

/* riquadro turni scrollabile in basso */
/* ULTIMO GIRO: annuncio a schermo e contatore al tavolo */
.lastcall-banner{position:absolute;left:0;right:0;top:34%;z-index:38;pointer-events:none;text-align:center;
  animation:lcIn .5s cubic-bezier(.2,1.3,.4,1) forwards}
.lastcall-banner.out{animation:lcOut .55s ease forwards}
.lastcall-banner .lc-title{font-family:var(--font-title);font-size:clamp(28px,9vw,54px);color:#ffd27a;
  text-shadow:0 3px 5px rgba(0,0,0,.95),0 0 30px rgba(255,170,50,.9),0 0 60px rgba(255,120,30,.5);letter-spacing:.04em}
.lastcall-banner .lc-sub{font-family:var(--font-body);font-size:clamp(12px,3.4vw,17px);color:var(--parch);
  margin-top:6px;text-shadow:0 2px 5px rgba(0,0,0,.9)}
@keyframes lcIn{0%{transform:scale(.5) translateY(24px);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes lcOut{0%{opacity:1}100%{opacity:0;transform:scale(1.15) translateY(-18px)}}
/* SCUDO sulla maschera che para, col valore assorbito */
.mask-shield{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);z-index:12;
  display:flex;flex-direction:column;align-items:center;pointer-events:none;
  animation:msPop .32s cubic-bezier(.2,1.5,.4,1) forwards}
.mask-shield .ms-ico{font-size:44px;filter:drop-shadow(0 0 12px rgba(120,190,255,.95)) drop-shadow(0 2px 4px rgba(0,0,0,.8))}
.mask-shield .ms-val{font-family:"Courier New",monospace;font-weight:bold;font-size:22px;color:#cfe8ff;
  -webkit-text-stroke:3px #062038;paint-order:stroke fill;margin-top:-6px;
  text-shadow:0 2px 6px rgba(0,0,0,.9)}
@keyframes msPop{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}
  60%{transform:translate(-50%,-50%) scale(1.18);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.mask-shield{animation:msPop .32s cubic-bezier(.2,1.5,.4,1) forwards, msOut .4s ease 1s forwards}
@keyframes msOut{to{opacity:0;transform:translate(-50%,-70%) scale(.9)}}

/* CARAFFA che versa vino nella damigiana */
.carafe-wrap{position:fixed;z-index:55;pointer-events:none;transform:translate(-50%,0)}
.carafe{width:46px;height:62px;transform-origin:70% 80%;animation:carafeTilt 1.6s ease-in-out forwards}
.carafe svg{width:100%;height:100%;filter:drop-shadow(0 3px 6px rgba(0,0,0,.7))}
@keyframes carafeTilt{0%{transform:rotate(0) translateY(-12px);opacity:0}
  18%{transform:rotate(-52deg) translateY(0);opacity:1}
  75%{transform:rotate(-58deg) translateY(0);opacity:1}
  100%{transform:rotate(0) translateY(-14px);opacity:0}}
.pour-stream{position:absolute;left:14px;top:44px;width:5px;height:0;border-radius:3px;
  background:linear-gradient(180deg,#c8283c,#7a0e18);opacity:0;
  animation:pourFlow 1.6s ease-in-out forwards}
@keyframes pourFlow{0%,15%{height:0;opacity:0}
  25%{height:38px;opacity:.95}
  70%{height:42px;opacity:.95}
  85%,100%{height:0;opacity:0}}

/* DAMIGIANA che si capovolge e rovescia il vino */
.otre.spilling{animation:spillTip 1.5s cubic-bezier(.35,.1,.4,1) forwards;transform-origin:60% 85%}
@keyframes spillTip{0%{transform:rotate(0)}
  22%{transform:rotate(-58deg)}
  62%{transform:rotate(-64deg)}
  100%{transform:rotate(0)}}
.spill-splash{position:fixed;z-index:54;pointer-events:none;transform:translate(-50%,0);
  width:44px;height:22px;border-radius:50%;
  background:radial-gradient(ellipse at 50% 30%,#a3121f 0%,rgba(122,14,24,.7) 55%,transparent 78%);
  animation:splashGrow 1.5s ease-out forwards}
@keyframes splashGrow{0%{transform:translate(-50%,0) scale(.2);opacity:0}
  30%{transform:translate(-50%,0) scale(1);opacity:.95}
  100%{transform:translate(-50%,6px) scale(1.5);opacity:0}}

/* contatore inciso nel legno: niente riquadro, solo lettere scavate nella superficie */
.lastcall-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:16;
  display:flex;align-items:baseline;gap:8px;padding:0;background:none;border:none;box-shadow:none;
  pointer-events:none;user-select:none}
.lastcall-badge .lcb-t{font-family:var(--font-title);font-size:17px;letter-spacing:.14em;
  color:rgba(38,20,10,.78);
  /* incisione: ombra scura dentro + luce sotto, come solco nel legno */
  text-shadow:0 -1px 0 rgba(0,0,0,.55), 0 1px 0 rgba(214,170,110,.30), 0 2px 1px rgba(255,215,160,.14)}
.lastcall-badge .lcb-n{font-family:var(--font-title);font-size:24px;line-height:1;
  color:rgba(30,15,7,.85);
  text-shadow:0 -1px 0 rgba(0,0,0,.6), 0 1px 0 rgba(224,180,120,.34), 0 2px 1px rgba(255,215,160,.16)}
/* ultime 3 mani: l'incisione si arrossa, come bruciata */
.lastcall-badge.urgent .lcb-t,.lastcall-badge.urgent .lcb-n{
  color:rgba(96,12,18,.88);
  text-shadow:0 -1px 0 rgba(0,0,0,.6), 0 1px 0 rgba(226,150,120,.34), 0 0 10px rgba(200,40,50,.30);
  animation:lcCarve 1.4s ease-in-out infinite}
@keyframes lcCarve{0%,100%{opacity:.85}50%{opacity:1}}
body[data-portrait="1"] .lastcall-badge{top:1.2vh;gap:2vw}
body[data-portrait="1"] .lastcall-badge .lcb-t{font-size:3.6vw}
body[data-portrait="1"] .lastcall-badge .lcb-n{font-size:5vw}
.log-box .lastcall-start{color:#ffd27a}
.log-box .lastcall-count{color:#ffb648}
.log-box .combo-name{color:var(--brass-hi);font-size:1.08em}
.log-box .combo-cards{opacity:.72;font-size:.92em}
.log-box{width:100%;max-width:820px;height:120px;overflow-y:auto;font-size:15px;color:var(--parch-dim);
  background:rgba(0,0,0,.4);border:1px solid var(--wood-lit);border-radius:8px;padding:6px 10px;line-height:1.5;margin-top:4px}
.log-box .me{color:var(--brass-hi)}.log-box .ai{color:var(--wine-glow)}.log-box .sys{color:var(--parch)}

/* ===== fine partita ===== */
.overlay{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 40%,rgba(0,0,0,.72),rgba(0,0,0,.93))}
.overlay.show{display:flex;animation:fadeIn .4s}
.overlay.lose-bg{background:radial-gradient(circle at 50% 40%,rgba(90,10,15,.78),rgba(0,0,0,.95))}
.endcard{text-align:center;max-width:440px;padding:8px;position:relative}
.endcard h2{font-size:60px;margin-bottom:8px;font-family:var(--font-title);letter-spacing:.03em}
.endcard.win h2{color:var(--brass-hi);
  text-shadow:0 2px 4px rgba(0,0,0,.9),0 0 28px rgba(255,180,60,.85),0 0 50px rgba(255,150,40,.5);
  animation:winRise .8s ease}
@keyframes winRise{0%{transform:scale(.4) translateY(30px);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.endcard.lose h2{color:var(--wine-glow);
  text-shadow:0 2px 4px rgba(0,0,0,.9),0 0 28px rgba(224,66,79,.8),0 0 50px rgba(180,20,40,.5);
  animation:loseShake .7s ease}
@keyframes loseShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px) rotate(-2deg)}30%{transform:translateX(9px) rotate(2deg)}45%{transform:translateX(-6px)}60%{transform:translateX(4px)}}
.endcard p{margin:6px 0 18px}
.endcard .end-reason{display:block;font-family:var(--font-body);font-size:16px;color:var(--parch);margin-bottom:10px;line-height:1.3}
.endcard .end-score{display:block;font-family:"Courier New",monospace;font-weight:bold;font-size:40px;color:var(--parch);letter-spacing:.06em;
  text-shadow:0 2px 6px rgba(0,0,0,.8)}
.endcard .score-num{font-variant-numeric:tabular-nums}
.endcard .btn{margin:4px}
.fx{position:absolute;inset:-40px 0 auto 0;height:0;pointer-events:none}
.coin{position:absolute;top:-20px;font-size:22px;animation:coinFall linear forwards}
@keyframes coinFall{0%{transform:translateY(-40px) rotate(0);opacity:1}100%{transform:translateY(460px) rotate(540deg);opacity:.2}}
.drip{position:absolute;top:0;width:3px;background:var(--wine-glow);opacity:.5;animation:dripDown 1.2s ease-in forwards}
@keyframes dripDown{0%{height:0;opacity:.7}100%{height:340px;opacity:0}}

/* ===== modale generico (regole / opzioni / conferma / changelog) ===== */
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);backdrop-filter:blur(3px);padding:20px}
.modal.show{display:flex;animation:fadeIn .3s}
.modal-card{background:linear-gradient(180deg,rgba(40,24,16,.98),rgba(24,14,9,.99));
  border:2px solid var(--brass);border-radius:14px;max-width:560px;width:100%;max-height:86vh;
  overflow-y:auto;padding:20px;box-shadow:0 12px 50px rgba(0,0,0,.8)}
